services:
  php:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: unless-stopped
