name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Validate Compose file
        run: docker compose config

      - name: Build images
        run: docker compose build

      - name: Smoke test /health
        run: |
          set -euo pipefail
          docker compose up -d
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/health -o /tmp/health.json \
              && python3 -c "import json; d=json.load(open('/tmp/health.json')); assert d.get('success') is True"; then
              docker compose down
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs php nginx
          echo "--- /health response body ---"
          curl -sS http://localhost:8080/health || true
          echo
          docker compose down
          exit 1
