name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Validate Compose file
        run: docker compose config

      - name: Build images
        run: docker compose build

      - name: Smoke test /health
        run: |
          set -euo pipefail
          docker compose up -d
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/health | grep -q '"success":true'; then
              docker compose down
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs php nginx
          exit 1
